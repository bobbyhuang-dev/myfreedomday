<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title>MyFreedomDay favicon</title>
  <desc>A teal square with a gold hashtag above the white letters MFD.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#168686" />
      <stop offset="1" stop-color="#0b5e5e" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#bg)" />
  <g font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', Arial, sans-serif" font-weight="900">
    <text x="7" y="24" fill="#f6c665" font-size="17">#</text>
    <text x="6" y="50" fill="#f6f7f9" font-size="25" letter-spacing="-1.2">MFD</text>
  </g>
</svg>
